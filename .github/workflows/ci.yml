name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------
  # Job 1: 항상 통과하는 check job
  # 이유: Branch Protection에서 Required status check로 등록할 job
  #       week5, week6 등 project1 변경 없는 PR도 머지 가능하게 함
  # ----------------------------------------
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 상태 체크 통과
        run: echo "OK"

  # ----------------------------------------
  # Job 2: project1 변경 시에만 실행
  # 이유: path 필터로 project1 변경 없으면 스킵
  #       불필요한 테스트/빌드/ECR 푸시 방지
  # ----------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: check # check job 통과 후 실행
    if: |
      contains(toJson(github.event.pull_request.files), 'project1-movie-recommend')
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 패키지 설치
        working-directory: project1-movie-recommend
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: 데이터 다운로드
        working-directory: project1-movie-recommend
        run: |
          mkdir -p data/ml-1m
          curl -O https://files.grouplens.org/datasets/movielens/ml-1m.zip
          unzip ml-1m.zip -d data/

      - name: 모델 학습
        working-directory: project1-movie-recommend
        run: |
          rm -f outputs/best_acc.txt
          python src/train.py

      - name: 테스트 실행
        working-directory: project1-movie-recommend
        run: pytest test_service.py -v

      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 빌드 & ECR 푸시
        uses: docker/build-push-action@v5
        with:
          context: project1-movie-recommend
          platforms: linux/amd64
          push: true
          tags: |
            947632012584.dkr.ecr.ap-northeast-2.amazonaws.com/movie-recommend:${{ github.sha }}
            947632012584.dkr.ecr.ap-northeast-2.amazonaws.com/movie-recommend:latest

      - name: K8s 배포
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" | base64 --decode > ~/.kube/config
          curl -LO "https://dl.k8s.io/release/v1.34.1/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl set image deployment/movie-recommend \
            movie-recommend=947632012584.dkr.ecr.ap-northeast-2.amazonaws.com/movie-recommend:${{ github.sha }} \
            --kubeconfig ~/.kube/config || true
